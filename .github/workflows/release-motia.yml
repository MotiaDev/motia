name: Release Motia

on:
  push:
    tags:
      - 'motia/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to rehearse'
        required: true
        type: string
      is_prerelease:
        description: 'Whether the candidate version is a prerelease'
        required: true
        type: boolean
      npm_tag:
        description: 'NPM dist-tag for the candidate release'
        required: true
        type: string
      dry_run:
        description: 'Run the release as a non-publishing rehearsal'
        required: true
        type: boolean
      source_ref:
        description: 'Git ref or SHA to build from'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: write

concurrency:
  group: release-motia-${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Setup: Parse tag metadata & notify
  # ──────────────────────────────────────────────────────────────

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      slack_ts: ${{ steps.slack.outputs.ts }}
    steps:
      - name: Extract metadata from tag
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG=""
            VERSION="${{ inputs.version }}"
            IS_PRERELEASE="${{ inputs.is_prerelease }}"
            NPM_TAG="${{ inputs.npm_tag }}"
            DRY_RUN="${{ inputs.dry_run }}"
            SOURCE_REF="${{ inputs.source_ref }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#motia/v}"
            SOURCE_REF="${GITHUB_SHA}"

            if [[ "$VERSION" =~ -([a-z]+)\.[0-9]+$ ]]; then
              LABEL="${BASH_REMATCH[1]}"
              IS_PRERELEASE=true
              NPM_TAG="$LABEL"
            else
              IS_PRERELEASE=false
              NPM_TAG=latest
            fi

            DRY_RUN=false
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "::notice::Motia release — version=$VERSION dry_run=$DRY_RUN source_ref=$SOURCE_REF"

      - name: Post initial Slack message
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Release started"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ steps.meta.outputs.dry_run == 'true' && ':test_tube: *Release Pipeline (Dry Run)* :hourglass_flowing_sand:' || '*Release Pipeline* :hourglass_flowing_sand:' }}\nmotia v${{ steps.meta.outputs.version }}${{ steps.meta.outputs.dry_run == 'true' && '\n\n_No commit, tag, release, or registry publish will be created._' || '' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

  # ──────────────────────────────────────────────────────────────
  # Motia Publish
  # ──────────────────────────────────────────────────────────────

  motia-npm:
    name: Motia JS Publish
    needs: [setup]
    uses: ./.github/workflows/_npm.yml
    with:
      package_path: frameworks/motia/motia-js/packages/motia
      npm_tag: ${{ needs.setup.outputs.npm_tag }}
      build_filter: motia
      pre_build_filter: iii-sdk
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
      source_ref: ${{ needs.setup.outputs.source_ref }}
      release_target: motia
      version_override: ${{ needs.setup.outputs.dry_run == 'true' && needs.setup.outputs.version || '' }}
      slack_thread_ts: ${{ needs.setup.outputs.slack_ts }}
      slack_label: Motia Node (npm)
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

  motia-py:
    name: Motia Python Publish
    needs: [setup]
    uses: ./.github/workflows/_py.yml
    with:
      package_path: frameworks/motia/motia-py/packages/motia
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
      source_ref: ${{ needs.setup.outputs.source_ref }}
      release_target: motia
      version_override: ${{ needs.setup.outputs.dry_run == 'true' && needs.setup.outputs.version || '' }}
      slack_thread_ts: ${{ needs.setup.outputs.slack_ts }}
      slack_label: Motia Python (pypi)
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_MOTIA_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

  # ──────────────────────────────────────────────────────────────
  # Notification: Complete
  # ──────────────────────────────────────────────────────────────

  notify-complete:
    name: Release Complete
    needs:
      - setup
      - motia-npm
      - motia-py
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine overall status
        id: status
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          DRY_RUN: ${{ needs.setup.outputs.dry_run }}
          MOTIA_NPM_RESULT: ${{ needs.motia-npm.result }}
          MOTIA_PY_RESULT: ${{ needs.motia-py.result }}
        run: |
          icon() {
            case "$1" in
              success) echo ":large_green_circle:" ;;
              skipped) echo ":fast_forward:" ;;
              *) echo ":red_circle:" ;;
            esac
          }

          LINES=""
          OVERALL="success"

          LINES="$LINES$(icon "$MOTIA_NPM_RESULT") Motia Node\n"
          LINES="$LINES$(icon "$MOTIA_PY_RESULT") Motia Python\n"

          for r in "$MOTIA_NPM_RESULT" "$MOTIA_PY_RESULT"; do
            [[ "$r" != "success" && "$r" != "skipped" ]] && OVERALL="failure"
          done

          SUMMARY="motia v${VERSION}"
          [[ "$DRY_RUN" == "true" ]] && SUMMARY="[DRY RUN] $SUMMARY"

          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Update Slack parent message
        if: needs.setup.outputs.slack_ts != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.update
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            ts: ${{ needs.setup.outputs.slack_ts }}
            text: "Release ${{ steps.status.outputs.overall }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ needs.setup.outputs.dry_run == 'true' && ':test_tube: *Release Pipeline (Dry Run)*' || '*Release Pipeline*' }} ${{ steps.status.outputs.overall == 'success' && ':large_green_circle:' || ':red_circle:' }}\n${{ steps.status.outputs.summary }}\n\n${{ steps.status.outputs.lines }}${{ needs.setup.outputs.dry_run == 'true' && '\n_No commit, tag, release, or registry publish was created._' || '' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
