name: Create Tag

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - iii
          - motia
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: 'Pre-release label (none = stable release)'
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
        default: none
      dry_run:
        description: 'Dry run (dispatches a release rehearsal without commits, tags, or publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    name: Bump Versions & Create Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.III_CI_APP_ID }}
          private-key: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Pre-flight checks
        env:
          TARGET: ${{ inputs.target }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [[ "$BRANCH" != "main" ]]; then
            echo "::error::Must be on main branch (currently on $BRANCH)"
            exit 1
          fi

          if [[ "$TARGET" == "iii" ]]; then
            for f in engine/Cargo.toml \
                     sdk/packages/rust/iii/Cargo.toml \
                     sdk/packages/node/iii/package.json \
                     sdk/packages/python/iii/pyproject.toml \
                     console/packages/console-rust/Cargo.toml; do
              if [[ ! -f "$f" ]]; then
                echo "::error::$f not found"
                exit 1
              fi
            done
          fi

          if [[ "$TARGET" == "motia" ]]; then
            for f in frameworks/motia/motia-js/packages/motia/package.json \
                     frameworks/motia/motia-py/packages/motia/pyproject.toml; do
              if [[ ! -f "$f" ]]; then
                echo "::error::$f not found"
                exit 1
              fi
            done
          fi

      - name: Calculate versions
        id: versions
        env:
          TARGET: ${{ inputs.target }}
          BUMP: ${{ inputs.bump }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          python3 .github/scripts/release_versioning.py compute \
            --repo-root "$GITHUB_WORKSPACE" \
            --target "$TARGET" \
            --bump "$BUMP" \
            --prerelease "$PRERELEASE" \
            --github-output "$GITHUB_OUTPUT"

      - name: Update iii manifests
        if: inputs.target == 'iii' && inputs.dry_run != true
        env:
          NEW_VERSION: ${{ steps.versions.outputs.version }}
          PY_VERSION: ${{ steps.versions.outputs.python_version }}
        run: |
          python3 .github/scripts/release_versioning.py stage \
            --repo-root "$GITHUB_WORKSPACE" \
            --target iii \
            --version "$NEW_VERSION" \
            --python-version "$PY_VERSION"

      - name: Update motia manifests
        if: inputs.target == 'motia' && inputs.dry_run != true
        env:
          NEW_VERSION: ${{ steps.versions.outputs.version }}
          PY_VERSION: ${{ steps.versions.outputs.python_version }}
        run: |
          python3 .github/scripts/release_versioning.py stage \
            --repo-root "$GITHUB_WORKSPACE" \
            --target motia \
            --version "$NEW_VERSION" \
            --python-version "$PY_VERSION"

      - name: Validate version updates
        if: inputs.dry_run != true
        env:
          TARGET: ${{ inputs.target }}
          VERSION: ${{ steps.versions.outputs.version }}
          PY_VERSION: ${{ steps.versions.outputs.python_version }}
        run: |
          check_cargo() {
            local actual
            actual=$(grep '^version = ' "$1" | head -n1 | cut -d'"' -f2)
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 version mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 -> $actual"
          }

          check_json() {
            local actual
            actual=$(grep '"version":' "$1" | head -n1 | cut -d'"' -f4)
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 version mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 -> $actual"
          }

          echo "Validating version updates..."

          if [[ "$TARGET" == "iii" ]]; then
            check_cargo "engine/Cargo.toml" "$VERSION"
            check_cargo "sdk/packages/rust/iii/Cargo.toml" "$VERSION"
            check_json "sdk/packages/node/iii/package.json" "$VERSION"
            check_cargo "sdk/packages/python/iii/pyproject.toml" "$PY_VERSION"
            check_cargo "console/packages/console-rust/Cargo.toml" "$VERSION"
          fi

          if [[ "$TARGET" == "motia" ]]; then
            check_json "frameworks/motia/motia-js/packages/motia/package.json" "$VERSION"
            check_cargo "frameworks/motia/motia-py/packages/motia/pyproject.toml" "$PY_VERSION"
          fi

          echo "All versions validated."

      - name: Check tag does not exist
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Configure git identity
        if: inputs.dry_run != true
        run: |
          git config user.name "iii-ci[bot]"
          git config user.email "iii-ci[bot]@users.noreply.github.com"

      - name: Commit and push
        if: inputs.dry_run != true
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          git add -A
          git commit -m "chore: bump versions for release -- ${{ inputs.target }}($TAG)"

          git push origin main

      - name: Create and push tag
        if: inputs.dry_run != true
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"

      - name: Dispatch dry-run release workflow
        if: inputs.dry_run == true
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          TARGET: ${{ inputs.target }}
          VERSION: ${{ steps.versions.outputs.version }}
          IS_PRERELEASE: ${{ steps.versions.outputs.is_prerelease }}
          NPM_TAG: ${{ steps.versions.outputs.npm_tag }}
        run: |
          WORKFLOW="release-${TARGET}.yml"
          SOURCE_REF=$(git rev-parse HEAD)

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW}/dispatches" \
            -f ref=main \
            -f inputs[version]="${VERSION}" \
            -f inputs[is_prerelease]="${IS_PRERELEASE}" \
            -f inputs[npm_tag]="${NPM_TAG}" \
            -f inputs[dry_run]=true \
            -f inputs[source_ref]="${SOURCE_REF}"

          echo "Dispatched ${WORKFLOW} dry run for ${VERSION} from ${SOURCE_REF}"

      - name: Notify Slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "${{ inputs.dry_run == true && '[DRY RUN] Release rehearsal dispatched' || 'Tag created for release' }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ inputs.dry_run == true && ':test_tube: *Dry Run — Release Rehearsal Dispatched*' || ':label: *Tag Created*' }}\n\n:package: ${{ inputs.target }} candidate: `${{ steps.versions.outputs.version }}`${{ inputs.dry_run != true && format('\nTag: `{0}`', steps.versions.outputs.tag) || '' }}\nPre-release: `${{ inputs.prerelease }}`\nTriggered by: ${{ github.actor }}${{ inputs.dry_run == true && '\n\n_No commits, tags, releases, or registry publishes were created._' || '' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
