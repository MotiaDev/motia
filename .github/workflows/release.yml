name: Release

on:
  workflow_dispatch:
    inputs:
      release_iii:
        description: 'Release iii (Engine + SDK + Console)'
        required: false
        type: boolean
        default: false
      iii_tag:
        description: 'iii git tag (e.g., iii/v1.0.0)'
        required: false
        type: string
        default: ''
      iii_version:
        description: 'iii version (e.g., 1.0.0)'
        required: false
        type: string
        default: ''
      release_motia:
        description: 'Release Motia'
        required: false
        type: boolean
        default: false
      motia_tag:
        description: 'Motia git tag (e.g., motia/v1.0.0)'
        required: false
        type: string
        default: ''
      motia_version:
        description: 'Motia version (e.g., 1.0.0)'
        required: false
        type: string
        default: ''
      npm_tag:
        description: 'NPM dist-tag'
        required: false
        type: string
        default: 'latest'
      is_prerelease:
        description: 'Is pre-release'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (build and validate without publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  actions: write

concurrency:
  group: release-${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Notification: Start
  # ──────────────────────────────────────────────────────────────

  notify-start:
    name: Notify Release Start
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.slack.outputs.ts }}
    steps:
      - name: Build status summary
        id: summary
        env:
          RELEASE_III: ${{ inputs.release_iii }}
          RELEASE_MOTIA: ${{ inputs.release_motia }}
          III_VERSION: ${{ inputs.iii_version }}
          MOTIA_VERSION: ${{ inputs.motia_version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          PARTS=""
          [[ "$RELEASE_III" == "true" ]] && PARTS="iii v${III_VERSION}"
          [[ "$RELEASE_MOTIA" == "true" ]] && {
            [[ -n "$PARTS" ]] && PARTS="$PARTS | "
            PARTS="${PARTS}motia v${MOTIA_VERSION}"
          }
          [[ "$DRY_RUN" == "true" ]] && PARTS="[DRY RUN] $PARTS"
          echo "parts=$PARTS" >> "$GITHUB_OUTPUT"

      - name: Post initial Slack message
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Release started"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ inputs.dry_run == true && ':test_tube: *Release Pipeline (Dry Run)* :hourglass_flowing_sand:' || '*Release Pipeline* :hourglass_flowing_sand:' }}\n${{ steps.summary.outputs.parts }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

  # ──────────────────────────────────────────────────────────────
  # iii Pipeline: GitHub Release
  # ──────────────────────────────────────────────────────────────

  create-iii-release:
    name: Create iii GitHub Release
    needs: [notify-start]
    if: inputs.release_iii == true && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.III_CI_APP_ID }}
          private-key: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.generate_token.outputs.token }}
          tag_name: ${{ inputs.iii_tag }}
          name: iii ${{ inputs.iii_version }}
          draft: false
          prerelease: ${{ inputs.is_prerelease }}
          generate_release_notes: true

  # ──────────────────────────────────────────────────────────────
  # iii Pipeline: Engine Binary
  # ──────────────────────────────────────────────────────────────

  engine-release:
    name: Engine Binary Release
    needs: [notify-start, create-iii-release]
    if: inputs.release_iii == true
    uses: ./.github/workflows/_rust-binary.yml
    with:
      bin_name: iii
      manifest_path: engine/Cargo.toml
      tag_name: ${{ inputs.iii_tag }}
      is_prerelease: ${{ inputs.is_prerelease }}
      skip_create_release: true
      dry_run: ${{ inputs.dry_run }}
      targets: >-
        [
          {"target":"x86_64-apple-darwin","os":"macos-latest"},
          {"target":"aarch64-apple-darwin","os":"macos-latest"},
          {"target":"x86_64-pc-windows-msvc","os":"windows-latest"},
          {"target":"i686-pc-windows-msvc","os":"windows-latest"},
          {"target":"aarch64-pc-windows-msvc","os":"windows-latest"},
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-22.04"},
          {"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest"},
          {"target":"aarch64-unknown-linux-gnu","os":"ubuntu-22.04"},
          {"target":"armv7-unknown-linux-gnueabihf","os":"ubuntu-22.04"}
        ]
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Engine Binary
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # iii Pipeline: Console Binary
  # ──────────────────────────────────────────────────────────────

  console-frontend:
    name: Build Console Frontend
    needs: [create-iii-release]
    if: inputs.release_iii == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for binary embedding
        run: pnpm --filter console-frontend build:binary

      - uses: actions/upload-artifact@v4
        with:
          name: console-frontend-dist
          path: console/packages/console-frontend/dist-binary/
          retention-days: 1

  console-release:
    name: Console Binary Release
    needs: [notify-start, console-frontend]
    if: inputs.release_iii == true
    uses: ./.github/workflows/_rust-binary.yml
    with:
      bin_name: iii-console
      manifest_path: console/packages/console-rust/Cargo.toml
      tag_name: ${{ inputs.iii_tag }}
      is_prerelease: ${{ inputs.is_prerelease }}
      skip_create_release: true
      dry_run: ${{ inputs.dry_run }}
      artifact_name: console-frontend-dist
      artifact_dest: console/packages/console-rust/assets/
      targets: >-
        [
          {"target":"x86_64-apple-darwin","os":"macos-latest"},
          {"target":"aarch64-apple-darwin","os":"macos-latest"},
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"},
          {"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest"},
          {"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest"}
        ]
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Console Binary
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # iii Pipeline: SDK Publish
  # ──────────────────────────────────────────────────────────────

  sdk-npm:
    name: SDK Node Publish
    needs: [notify-start, create-iii-release]
    if: inputs.release_iii == true
    uses: ./.github/workflows/_npm.yml
    with:
      package_path: sdk/packages/node/iii
      npm_tag: ${{ inputs.npm_tag }}
      build_filter: iii-sdk
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: SDK Node (npm)
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  sdk-py:
    name: SDK Python Publish
    needs: [notify-start, create-iii-release]
    if: inputs.release_iii == true
    uses: ./.github/workflows/_py.yml
    with:
      package_path: sdk/packages/python/iii
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: SDK Python (pypi)
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  sdk-rust:
    name: SDK Rust Publish
    needs: [notify-start, create-iii-release]
    if: inputs.release_iii == true
    uses: ./.github/workflows/_rust-cargo.yml
    with:
      package_path: sdk/packages/rust/iii
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: SDK Rust (cargo)
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # iii Pipeline: Homebrew
  # ──────────────────────────────────────────────────────────────

  homebrew-engine:
    name: Homebrew Engine
    needs: [notify-start, engine-release]
    if: inputs.release_iii == true && inputs.is_prerelease != true && inputs.dry_run != true
    uses: ./.github/workflows/_homebrew.yml
    with:
      bin_name: iii
      formula_class: Iii
      formula_path: Formula/iii.rb
      description: WebSocket-based process communication engine
      homepage: https://github.com/iii-hq/iii
      release_repo: ${{ github.repository }}
      release_tag: ${{ inputs.iii_tag }}
      version: ${{ inputs.iii_version }}
      include_linux: false
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Homebrew (iii)
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  homebrew-console:
    name: Homebrew Console
    needs: [notify-start, console-release]
    if: inputs.release_iii == true && inputs.is_prerelease != true && inputs.dry_run != true
    uses: ./.github/workflows/_homebrew.yml
    with:
      bin_name: iii-console
      formula_class: IiiConsole
      formula_path: Formula/iii-console.rb
      description: Developer console for the iii engine
      homepage: https://github.com/iii-hq/iii
      release_repo: ${{ github.repository }}
      release_tag: ${{ inputs.iii_tag }}
      version: ${{ inputs.iii_version }}
      include_linux: true
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Homebrew (iii-console)
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Motia Pipeline: Gate (wait for iii if both)
  # ──────────────────────────────────────────────────────────────

  motia-gate:
    name: Motia Gate
    needs:
      - engine-release
      - console-release
      - sdk-npm
      - sdk-py
      - sdk-rust
    if: |
      always() &&
      inputs.release_motia == true &&
      (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped') &&
      (needs.console-release.result == 'success' || needs.console-release.result == 'skipped') &&
      (needs.sdk-npm.result == 'success' || needs.sdk-npm.result == 'skipped') &&
      (needs.sdk-py.result == 'success' || needs.sdk-py.result == 'skipped') &&
      (needs.sdk-rust.result == 'success' || needs.sdk-rust.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: iii pipeline check
        env:
          RELEASE_III: ${{ inputs.release_iii }}
          ENGINE_RESULT: ${{ needs.engine-release.result }}
          CONSOLE_RESULT: ${{ needs.console-release.result }}
          SDK_NPM_RESULT: ${{ needs.sdk-npm.result }}
          SDK_PY_RESULT: ${{ needs.sdk-py.result }}
          SDK_RUST_RESULT: ${{ needs.sdk-rust.result }}
        run: |
          if [[ "$RELEASE_III" == "true" ]]; then
            echo "iii pipeline completed — Engine: $ENGINE_RESULT, Console: $CONSOLE_RESULT, SDK npm: $SDK_NPM_RESULT, SDK py: $SDK_PY_RESULT, SDK rust: $SDK_RUST_RESULT"
            if [[ "$SDK_NPM_RESULT" != "success" || "$SDK_PY_RESULT" != "success" ]]; then
              echo "::error::iii SDK publish failed — cannot release motia (depends on iii-sdk)"
              exit 1
            fi
          fi
          echo "Motia gate passed"

  # ──────────────────────────────────────────────────────────────
  # Motia Pipeline: Publish
  # ──────────────────────────────────────────────────────────────

  motia-npm:
    name: Motia JS Publish
    needs: [notify-start, motia-gate]
    if: |
      always() &&
      inputs.release_motia == true &&
      needs.motia-gate.result == 'success'
    uses: ./.github/workflows/_npm.yml
    with:
      package_path: frameworks/motia/motia-js/packages/motia
      npm_tag: ${{ inputs.npm_tag }}
      build_filter: motia
      pre_build_filter: iii-sdk
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Motia Node (npm)
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  motia-py:
    name: Motia Python Publish
    needs: [notify-start, motia-gate]
    if: |
      always() &&
      inputs.release_motia == true &&
      needs.motia-gate.result == 'success'
    uses: ./.github/workflows/_py.yml
    with:
      package_path: frameworks/motia/motia-py/packages/motia
      dry_run: ${{ inputs.dry_run }}
      slack_thread_ts: ${{ needs.notify-start.outputs.slack_ts }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_ID }}
      slack_label: Motia Python (pypi)
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_MOTIA_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Notification: Complete
  # ──────────────────────────────────────────────────────────────

  notify-complete:
    name: Release Complete
    needs:
      - notify-start
      - engine-release
      - console-release
      - sdk-npm
      - sdk-py
      - sdk-rust
      - homebrew-engine
      - homebrew-console
      - motia-npm
      - motia-py
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine overall status
        id: status
        env:
          RELEASE_III: ${{ inputs.release_iii }}
          RELEASE_MOTIA: ${{ inputs.release_motia }}
          III_VERSION: ${{ inputs.iii_version }}
          MOTIA_VERSION: ${{ inputs.motia_version }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          DRY_RUN: ${{ inputs.dry_run }}
          ENGINE_RESULT: ${{ needs.engine-release.result }}
          CONSOLE_RESULT: ${{ needs.console-release.result }}
          SDK_NPM_RESULT: ${{ needs.sdk-npm.result }}
          SDK_PY_RESULT: ${{ needs.sdk-py.result }}
          SDK_RUST_RESULT: ${{ needs.sdk-rust.result }}
          BREW_ENGINE_RESULT: ${{ needs.homebrew-engine.result }}
          BREW_CONSOLE_RESULT: ${{ needs.homebrew-console.result }}
          MOTIA_NPM_RESULT: ${{ needs.motia-npm.result }}
          MOTIA_PY_RESULT: ${{ needs.motia-py.result }}
        run: |
          icon() {
            case "$1" in
              success) echo ":large_green_circle:" ;;
              skipped) echo ":fast_forward:" ;;
              *) echo ":red_circle:" ;;
            esac
          }

          LINES=""
          OVERALL="success"

          if [[ "$RELEASE_III" == "true" ]]; then
            LINES="$LINES$(icon "$ENGINE_RESULT") Engine Binary\n"
            LINES="$LINES$(icon "$CONSOLE_RESULT") Console Binary\n"
            LINES="$LINES$(icon "$SDK_NPM_RESULT") SDK Node\n"
            LINES="$LINES$(icon "$SDK_PY_RESULT") SDK Python\n"
            LINES="$LINES$(icon "$SDK_RUST_RESULT") SDK Rust\n"

            if [[ "$IS_PRERELEASE" != "true" ]]; then
              LINES="$LINES$(icon "$BREW_ENGINE_RESULT") Homebrew (iii)\n"
              LINES="$LINES$(icon "$BREW_CONSOLE_RESULT") Homebrew (iii-console)\n"
            fi

            for r in "$ENGINE_RESULT" "$CONSOLE_RESULT" "$SDK_NPM_RESULT" "$SDK_PY_RESULT" "$SDK_RUST_RESULT"; do
              [[ "$r" != "success" && "$r" != "skipped" ]] && OVERALL="failure"
            done
          fi

          if [[ "$RELEASE_MOTIA" == "true" ]]; then
            LINES="$LINES$(icon "$MOTIA_NPM_RESULT") Motia Node\n"
            LINES="$LINES$(icon "$MOTIA_PY_RESULT") Motia Python\n"
            for r in "$MOTIA_NPM_RESULT" "$MOTIA_PY_RESULT"; do
              [[ "$r" != "success" && "$r" != "skipped" ]] && OVERALL="failure"
            done
          fi

          SUMMARY=""
          [[ "$RELEASE_III" == "true" ]] && SUMMARY="iii v${III_VERSION}"
          [[ "$RELEASE_MOTIA" == "true" ]] && {
            [[ -n "$SUMMARY" ]] && SUMMARY="$SUMMARY | "
            SUMMARY="${SUMMARY}motia v${MOTIA_VERSION}"
          }
          [[ "$DRY_RUN" == "true" ]] && SUMMARY="[DRY RUN] $SUMMARY"

          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Update Slack parent message
        if: needs.notify-start.outputs.slack_ts != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.update
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            ts: ${{ needs.notify-start.outputs.slack_ts }}
            text: "Release ${{ steps.status.outputs.overall }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ inputs.dry_run == true && ':test_tube: *Release Pipeline (Dry Run)*' || '*Release Pipeline*' }} ${{ steps.status.outputs.overall == 'success' && ':large_green_circle:' || ':red_circle:' }}\n${{ steps.status.outputs.summary }}\n\n${{ steps.status.outputs.lines }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
