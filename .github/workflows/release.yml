name: Release

on:
  workflow_dispatch:
    inputs:
      release_engine:
        description: 'Release Engine'
        required: false
        type: boolean
        default: false
      engine_tag:
        description: 'Engine git tag (e.g., engine/v0.7.1)'
        required: false
        type: string
        default: ''
      engine_version:
        description: 'Engine version (e.g., 0.7.1)'
        required: false
        type: string
        default: ''
      release_sdk:
        description: 'Release SDK'
        required: false
        type: boolean
        default: false
      sdk_tag:
        description: 'SDK git tag (e.g., sdk/v0.4.2)'
        required: false
        type: string
        default: ''
      sdk_version:
        description: 'SDK version (e.g., 0.4.2)'
        required: false
        type: string
        default: ''
      release_console:
        description: 'Release Console'
        required: false
        type: boolean
        default: false
      console_tag:
        description: 'Console git tag (e.g., console/v0.2.5)'
        required: false
        type: string
        default: ''
      console_version:
        description: 'Console version (e.g., 0.2.5)'
        required: false
        type: string
        default: ''
      release_motia:
        description: 'Release Motia'
        required: false
        type: boolean
        default: false
      motia_tag:
        description: 'Motia git tag (e.g., motia/v1.0.0)'
        required: false
        type: string
        default: ''
      motia_version:
        description: 'Motia version (e.g., 1.0.0)'
        required: false
        type: string
        default: ''
      npm_tag:
        description: 'NPM dist-tag'
        required: false
        type: string
        default: 'latest'
      is_prerelease:
        description: 'Is pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  actions: write

concurrency:
  group: release

jobs:
  # ──────────────────────────────────────────────────────────────
  # Notification
  # ──────────────────────────────────────────────────────────────

  notify-start:
    name: Notify Release Start
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.slack.outputs.ts }}
    steps:
      - name: Build status lines
        id: lines
        env:
          RELEASE_ENGINE: ${{ inputs.release_engine }}
          RELEASE_SDK: ${{ inputs.release_sdk }}
          RELEASE_CONSOLE: ${{ inputs.release_console }}
          RELEASE_MOTIA: ${{ inputs.release_motia }}
          ENGINE_TAG: ${{ inputs.engine_tag }}
          SDK_TAG: ${{ inputs.sdk_tag }}
          CONSOLE_TAG: ${{ inputs.console_tag }}
          MOTIA_TAG: ${{ inputs.motia_tag }}
        run: |
          STATUS=""
          [[ "$RELEASE_ENGINE" == "true" ]] && STATUS="$STATUS:white_square: Engine ($ENGINE_TAG)\n"
          [[ "$RELEASE_SDK" == "true" ]] && STATUS="$STATUS:white_square: SDK ($SDK_TAG)\n"
          [[ "$RELEASE_CONSOLE" == "true" ]] && STATUS="$STATUS:white_square: Console ($CONSOLE_TAG)\n"
          [[ "$RELEASE_MOTIA" == "true" ]] && STATUS="$STATUS:white_square: Motia ($MOTIA_TAG)\n"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Post initial Slack message
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Release started"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Release Pipeline*\n\n${{ steps.lines.outputs.status }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

  # ──────────────────────────────────────────────────────────────
  # Step 1: Engine Release (binaries)
  # ──────────────────────────────────────────────────────────────

  engine-release:
    name: Engine Release
    needs: [notify-start]
    if: inputs.release_engine == true
    uses: ./.github/workflows/_rust-binary.yml
    with:
      bin_name: iii
      manifest_path: engine/Cargo.toml
      tag_name: ${{ inputs.engine_tag }}
      is_prerelease: ${{ inputs.is_prerelease }}
      targets: >-
        [
          {"target":"x86_64-apple-darwin","os":"macos-latest"},
          {"target":"aarch64-apple-darwin","os":"macos-latest"},
          {"target":"x86_64-pc-windows-msvc","os":"windows-latest"},
          {"target":"i686-pc-windows-msvc","os":"windows-latest"},
          {"target":"aarch64-pc-windows-msvc","os":"windows-latest"},
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-22.04"},
          {"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest"},
          {"target":"aarch64-unknown-linux-gnu","os":"ubuntu-22.04"},
          {"target":"armv7-unknown-linux-gnueabihf","os":"ubuntu-22.04"}
        ]
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

  trigger-engine-pkg-managers:
    name: Trigger Engine Package Managers
    needs: [engine-release]
    if: inputs.release_engine == true && inputs.is_prerelease != true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew
        uses: actions/github-script@v7
        env:
          ENGINE_TAG: ${{ inputs.engine_tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-engine-homebrew.yml',
              ref: 'main',
              inputs: { version: process.env.ENGINE_TAG, dry_run: 'false' }
            });

  # ──────────────────────────────────────────────────────────────
  # Step 2: SDK Publish (after engine)
  # ──────────────────────────────────────────────────────────────

  sdk-npm:
    name: SDK Node Publish
    needs: [engine-release]
    if: |
      always() &&
      inputs.release_sdk == true &&
      (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped')
    uses: ./.github/workflows/_npm.yml
    with:
      package_path: sdk/packages/node/iii
      npm_tag: ${{ inputs.npm_tag }}
      build_filter: iii-sdk
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  sdk-py:
    name: SDK Python Publish
    needs: [engine-release]
    if: |
      always() &&
      inputs.release_sdk == true &&
      (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped')
    uses: ./.github/workflows/_py.yml
    with:
      package_path: sdk/packages/python/iii
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  sdk-rust:
    name: SDK Rust Publish
    needs: [engine-release]
    if: |
      always() &&
      inputs.release_sdk == true &&
      (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped')
    uses: ./.github/workflows/_rust-cargo.yml
    with:
      package_path: sdk/packages/rust/iii
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Step 2b: Console Release (after engine, parallel with SDK)
  # ──────────────────────────────────────────────────────────────

  console-frontend:
    name: Build Console Frontend
    needs: [engine-release]
    if: |
      always() &&
      inputs.release_console == true &&
      (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for binary embedding
        run: pnpm --filter console-frontend build:binary

      - uses: actions/upload-artifact@v4
        with:
          name: console-frontend-dist
          path: console/packages/console-frontend/dist-binary/
          retention-days: 1

  console-release:
    name: Console Release
    needs: [console-frontend]
    if: inputs.release_console == true
    uses: ./.github/workflows/_rust-binary.yml
    with:
      bin_name: iii-console
      manifest_path: console/packages/console-rust/Cargo.toml
      tag_name: ${{ inputs.console_tag }}
      is_prerelease: ${{ inputs.is_prerelease }}
      artifact_name: console-frontend-dist
      artifact_dest: console/packages/console-rust/assets/
      targets: >-
        [
          {"target":"x86_64-apple-darwin","os":"macos-latest"},
          {"target":"aarch64-apple-darwin","os":"macos-latest"},
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"},
          {"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest"},
          {"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest"}
        ]
    secrets:
      III_CI_APP_ID: ${{ secrets.III_CI_APP_ID }}
      III_CI_APP_PRIVATE_KEY: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

  trigger-console-pkg-managers:
    name: Trigger Console Package Managers
    needs: [console-release]
    if: inputs.release_console == true && inputs.is_prerelease != true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew
        uses: actions/github-script@v7
        env:
          CONSOLE_TAG: ${{ inputs.console_tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-console-homebrew.yml',
              ref: 'main',
              inputs: { version: process.env.CONSOLE_TAG, dry_run: 'false' }
            });

  # ──────────────────────────────────────────────────────────────
  # Step 3: Motia Publish (after SDK)
  # ──────────────────────────────────────────────────────────────

  motia-npm:
    name: Motia JS Publish
    needs: [sdk-npm]
    if: |
      always() &&
      inputs.release_motia == true &&
      (needs.sdk-npm.result == 'success' || needs.sdk-npm.result == 'skipped')
    uses: ./.github/workflows/_npm.yml
    with:
      package_path: frameworks/motia/motia-js/packages/motia
      npm_tag: ${{ inputs.npm_tag }}
      build_filter: motia
      pre_build_filter: iii-sdk
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  motia-py:
    name: Motia Python Publish
    needs: [sdk-py]
    if: |
      always() &&
      inputs.release_motia == true &&
      (needs.sdk-py.result == 'success' || needs.sdk-py.result == 'skipped')
    uses: ./.github/workflows/_py.yml
    with:
      package_path: frameworks/motia/motia-py/packages/motia
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_MOTIA_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Final: Notify completion
  # ──────────────────────────────────────────────────────────────

  notify-complete:
    name: Release Complete
    needs:
      - notify-start
      - engine-release
      - sdk-npm
      - sdk-py
      - sdk-rust
      - console-release
      - motia-npm
      - motia-py
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        env:
          RELEASE_ENGINE: ${{ inputs.release_engine }}
          RELEASE_SDK: ${{ inputs.release_sdk }}
          RELEASE_CONSOLE: ${{ inputs.release_console }}
          RELEASE_MOTIA: ${{ inputs.release_motia }}
          ENGINE_TAG: ${{ inputs.engine_tag }}
          SDK_TAG: ${{ inputs.sdk_tag }}
          CONSOLE_TAG: ${{ inputs.console_tag }}
          MOTIA_TAG: ${{ inputs.motia_tag }}
          ENGINE_RESULT: ${{ needs.engine-release.result }}
          SDK_NPM_RESULT: ${{ needs.sdk-npm.result }}
          SDK_PY_RESULT: ${{ needs.sdk-py.result }}
          SDK_RUST_RESULT: ${{ needs.sdk-rust.result }}
          CONSOLE_RESULT: ${{ needs.console-release.result }}
          MOTIA_NPM_RESULT: ${{ needs.motia-npm.result }}
          MOTIA_PY_RESULT: ${{ needs.motia-py.result }}
        run: |
          icon() {
            case "$1" in
              success) echo ":white_check_mark:" ;;
              skipped) echo ":fast_forward:" ;;
              *) echo ":x:" ;;
            esac
          }

          LINES=""
          OVERALL="success"

          if [[ "$RELEASE_ENGINE" == "true" ]]; then
            LINES="$LINES$(icon "$ENGINE_RESULT") Engine ($ENGINE_TAG)\n"
            [[ "$ENGINE_RESULT" != "success" ]] && OVERALL="failure"
          fi
          if [[ "$RELEASE_SDK" == "true" ]]; then
            LINES="$LINES$(icon "$SDK_NPM_RESULT") SDK Node\n"
            LINES="$LINES$(icon "$SDK_PY_RESULT") SDK Python\n"
            LINES="$LINES$(icon "$SDK_RUST_RESULT") SDK Rust\n"
            [[ "$SDK_NPM_RESULT" != "success" || "$SDK_PY_RESULT" != "success" || "$SDK_RUST_RESULT" != "success" ]] && OVERALL="failure"
          fi
          if [[ "$RELEASE_CONSOLE" == "true" ]]; then
            LINES="$LINES$(icon "$CONSOLE_RESULT") Console ($CONSOLE_TAG)\n"
            [[ "$CONSOLE_RESULT" != "success" ]] && OVERALL="failure"
          fi
          if [[ "$RELEASE_MOTIA" == "true" ]]; then
            LINES="$LINES$(icon "$MOTIA_NPM_RESULT") Motia JS\n"
            LINES="$LINES$(icon "$MOTIA_PY_RESULT") Motia Python\n"
            [[ "$MOTIA_NPM_RESULT" != "success" || "$MOTIA_PY_RESULT" != "success" ]] && OVERALL="failure"
          fi

          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"

      - name: Update Slack
        if: needs.notify-start.outputs.slack_ts != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.update
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            ts: ${{ needs.notify-start.outputs.slack_ts }}
            text: "Release ${{ steps.status.outputs.overall }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Release Pipeline* ${{ steps.status.outputs.overall == 'success' && ':white_check_mark:' || ':x:' }}\n\n${{ steps.status.outputs.lines }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
